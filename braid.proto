// Braid protocol buffer definitions

edition = "2023";

option go_package = "github.com/vsekhar/braid";

package braid;

import "google/protobuf/timestamp.proto";

// MessageRef identifies a message by a versioned hash.
//
// Each field represents a distinct hashing scheme (fields included and
// algorithm used). Only one field should be set. Old schemes can be retired
// using 'reserved' or the 'deprecated' annotation.
message MessageRef {
  // sha256_v1: SHA-256 over the following fields of Message, using
  // explicit fixed-width big-endian encodings (not protobuf serialization):
  //
  //   - timestamp: int64 seconds || int32 nanos
  //   - author: ed25519_v1 public key bytes (32 bytes)
  //   - parent table: for each entry in order:
  //       parent sha256_v1 (32 bytes) || uint64 message_count
  //
  // The signature field is excluded.
  bytes sha256_v1 = 1;
}

// PublicKey identifies an author. Each field represents a distinct key
// algorithm. Only one field should be set.
message PublicKey {
  bytes ed25519_v1 = 1;
}

// Signature is a cryptographic signature over a message. Each field
// represents a distinct signing scheme. Only one field should be set.
message Signature {
  bytes ed25519_v1 = 1;
}

// ParentTable is an ordered list of parents and the count of additional
// messages reachable from each.
message ParentTable {
  message Entry {
    MessageRef parent = 1;
    uint64 message_count = 2;
  }
  repeated Entry entries = 1;
}

// Message is a single entry in the hash chain.
message Message {
  google.protobuf.Timestamp timestamp = 1;
  ParentTable parents = 2;
  PublicKey author = 3;
  Signature signature = 4;
}

// PeerInfo identifies a peer by its public key and listen address.
message PeerInfo {
  PublicKey key = 1;
  string address = 2;
}

// PeerGossip is a push-only list of known peers.
message PeerGossip {
  repeated PeerInfo peers = 1;
}

// MessageRequest is sent by a node to request messages it needs.
// The responding node walks backward from the wanted refs, stopping
// at the requester's frontier, and streams back any messages it has.
message MessageRequest {
  repeated MessageRef wanted = 1;
  repeated MessageRef frontier = 2;
}

// Envelope is the wire format for peer-to-peer communication.
// Each envelope is sent as a 4-byte big-endian length prefix followed
// by the serialized Envelope bytes.
message Envelope {
  oneof body {
    Message message = 1;
    PeerGossip peer_gossip = 2;
    MessageRequest message_request = 3;
  }
}
